<div class="container mt-5">

    <div class="row">
      <div class="col-8">
        <h3>News</h3>
        <button class="btn btn-outline-primary" data-bs-toggle="modal" data-bs-target="#staticBack2">Add News</button>
        <table class="table table-hover mt-3">
          <thead>
            <th>News Id</th>
            <th>News Title</th>
            <th>News Content</th>
            <th>News Img</th>
            <th>News Category</th>
            <th>News Create Date</th>
            <th>Edit</th>
            <th>Delete</th>
          </thead>
          <tbody>
            <tr *ngFor="let new of news">
              <td>{{ new.newsId }}</td>
              <td>{{ new.newsTitle }}</td>
              <td>{{ new.newsContent }}</td>
              <td>{{ new.newsImg }}</td>
              <td>{{ new.newsCategory }}</td>
              <td>{{ new.newsCdate }}</td>
              <td><button class="btn btn-outline-warning" (click)="newsEdit(new, modalNews)" data-bs-toggle="modal" data-bs-target="#staticBack1">Edit</button></td>
              <td><button class="btn btn-outline-danger" (click)="newsRemove(new)">Delete</button></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
  
  <!-- Modal -->
  <div class="modal fade" #modalNews id="staticBack1" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true">
    <div class="modal-dialog">
      <form [formGroup]="frm" (submit)="newsEditAdd()">
      <div class="modal-content">
        <div class="modal-header">
          <h1 class="modal-title fs-5" id="staticBackdropLabel">User Edit</h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label>News Title</label>
            <input type="text" class="form-control" formControlName="newsTitle" >
            <label>News Content</label>
            <input type="text" class="form-control" formControlName="newsContent">
            <label>News Img</label>
            <input type="text" class="form-control" formControlName="newsImg">
            <label>News Category</label>
            <select class="form-control" formControlName="newsCategory" >
              <option value="Spor">Spor</option>
              <option value="Siyaset">Siyaset</option>
            </select>
            <input type="hidden" class="form-control">

          </div>
        </div>
        <div class="modal-footer">
          <input type="submit" class="btn btn-outline-primary" value="Save">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </form>
    </div>
  </div>

  <div class="modal fade" #modalNewsAdd id="staticBack2" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="staticBackdrop2" aria-hidden="true">
    <div class="modal-dialog">
      <form [formGroup]="frm" (submit)="newsAdd()">
      <div class="modal-content">
        <div class="modal-header">
          <h1 class="modal-title fs-5" id="staticBackdropLabel">News Edit</h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label>News Title</label>
            <input type="text" class="form-control" formControlName="newsTitle" >
            <label>News Content</label>
            <input type="text" class="form-control" formControlName="newsContent">
            <label>News Img</label>
            <input type="text" class="form-control" formControlName="newsImg">
            <label>News Category</label>
            <select class="form-control" formControlName="newsCategory" >
              <option value="Spor">Spor</option>
              <option value="Siyaset">Siyaset</option>
            </select>
            <input type="hidden" class="form-control">

          </div>
        </div>
        <div class="modal-footer">
          <input type="submit" class="btn btn-outline-primary" value="Save">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </form>
    </div>
  </div>
